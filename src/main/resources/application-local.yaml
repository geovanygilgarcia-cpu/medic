spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: huevolas12.
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 60000        # 60s en vez de 30s por defecto (útil mientras debugueas)
      max-lifetime: 1800000            # 30 min
      idle-timeout: 600000             # 10 min
      leak-detection-threshold: 30000  # avisa en log si una conexión se mantiene "prestada" más de 30s

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

app:
  jwt:
    secret: "cambia-este-secreto-por-uno-largo-y-aleatorio-de-al-menos-32-caracteres"

logging:
  level:
    com.zaxxer.hikari: DEBUG
    org.hibernate.SQL: DEBUG